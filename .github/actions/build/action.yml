name: Build Package

inputs:
  cache-auth-token:
    description: Cachix auth token
    default: ""

runs:
  using: "composite"
  steps:
    - uses: cachix/install-nix-action@v25
    - uses: cachix/cachix-action@v14
      with:
        name: refloat
        authToken: '${{ inputs.cache-auth-token }}'

    - name: Build
      shell: bash
      run: nix build .#refloat
